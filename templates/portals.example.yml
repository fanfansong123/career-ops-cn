# 国内公司招聘门户配置
# Used by /career-ops scan to discover new offers automatically.
#
# 扫描策略（4个层级）：
#   0. Local parser → 每个公司的 parser: 脚本用于 SSR/静态招聘页面（零 token）
#   1. Playwright → 每个公司的 careers_url（实时、可靠）
#   2. WebSearch → 使用 site: 过滤器搜索（广泛发现，可能过时）
#   3. BOSS直聘/猎聘/拉勾 平台搜索 → 国内主流招聘平台
#
# 注意：每个 tracked_companies 中的公司必须包含 careers_url。
#   优先使用公司自有招聘官网；仅在没有自有招聘页时才使用第三方平台链接。

# -- 搜索查询 --
# 用于国内招聘平台的 WebSearch 发现
search_queries:
  - query: 'site:zhipin.com "后端开发" "北京"'
    source: "BOSS直聘"
  - query: 'site:zhipin.com "AI" "大模型" "北京"'
    source: "BOSS直聘"
  - query: 'site:liepin.com "高级后端" "北京"'
    source: "猎聘"
  - query: 'site:lagou.com "后端开发" "北京"'
    source: "拉勾"
  - query: 'site:jobs.bytedance.com "后端"'
    source: "字节跳动官网"
  - query: 'site:zhaopin.meituan.com "后端"'
    source: "美团官网"

# -- 标题过滤 --
title_filter:
  positive:
    - "后端"
    - "服务端"
    - "Golang"
    - "Java"
    - "架构"
    - "AI"
    - "大模型"
    - "Agent"
    - "平台开发"
    - "基础架构"
    - "云计算"
    - "中间件"
  negative:
    - "实习"
    - "外包"
    - "驻场"
    - "Intern"
    - "培训生"
    - "应届"
  seniority_boost:
    - "高级"
    - "资深"
    - "专家"
    - "架构师"
    - "Staff"
    - "负责人"

# -- 地点过滤 --
location_filter:
  allow:
    - "北京"
    - "远程"
    - "Remote"
  block:
    - "新加坡"
    - "东京"
    - "美国"

# -- 重点追踪公司 --
# 按类型分组：互联网大厂、AI/大模型公司、外企中国、热门独角兽、国企/研究院
